  # GNN-PPO Training Configuration
# Robot Parameters
max_robot_capacity: 3
max_wait_delay_s:   200.0
max_travel_delay_s: 3600.0
# Environment parameters
num_robots: 6
num_tasks: 40
radius: 100

batch_time: 180
vicinity_m: 100


# Graph parameters
K_max: 5              # Max candidate tasks per robot
N_max: 15             # Max nodes in ego-graph
E_max: 50             # Max edges in ego-graph

# Feature parameters
use_xy_pickup: false
normalize_features: true
use_node_type: true
use_ego_robot: true
use_edge_rt: false

# 2-hop parameters
two_hop: false

# Decision making
decision_interval: 8  # Steps between policy decisions

# PPO parameters
ppo_steps: 2048
batch_size: 64
learning_rate: 0.0003
total_timesteps: 10000
noop_init:   -1.0      


max_steps: 2500
